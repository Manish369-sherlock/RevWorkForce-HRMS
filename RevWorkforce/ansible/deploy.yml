---
# ═══════════════════════════════════════════════════════════════
# WorkForce HRMS — Ansible Blue-Green Deployment Playbook
# ═══════════════════════════════════════════════════════════════
# Strategy: serial: 1 → deploys ONE server at a time
# Server is deregistered from ALB → updated → health checked → re-registered
# This ensures ZERO downtime during deployment
#
# Required variables (passed from Jenkins via extraVars):
#   - build_number       (Jenkins BUILD_NUMBER)
#   - aws_account_id     (ECR registry account)
#   - aws_region         (e.g. eu-north-1)
#   - target_group_arn   (ALB target group ARN)

- name: Blue-Green Deploy WorkForce HRMS
  hosts: webservers
  become: yes
  gather_facts: no
  ignore_unreachable: yes
  serial: 1

  vars:
    ansible_ssh_timeout: 60
    ansible_command_timeout: 120
    ecr_registry: "{{ aws_account_id }}.dkr.ecr.{{ aws_region }}.amazonaws.com"
    backend_image: "{{ ecr_registry }}/workforce-backend:{{ build_number }}"
    frontend_image: "{{ ecr_registry }}/workforce-frontend:{{ build_number }}"

  pre_tasks:
    - name: Wait for SSH connection before deployment
      wait_for_connection:
        timeout: 20
        connect_timeout: 5
        sleep: 2
      register: ssh_ready
      ignore_errors: yes
      ignore_unreachable: yes

    - name: Skip host when SSH is unreachable
      meta: end_host
      when: ssh_ready is failed

    - name: Gather facts for reachable hosts only
      setup:

  tasks:

    # ─── Step 0a: Ensure swap is configured (prevents OOM on t3.micro) ───
    - name: Check if swap is already active
      command: swapon --show
      register: swap_check
      changed_when: false

    - name: Create swapfile if not exists
      command: fallocate -l 2G /swapfile
      args:
        creates: /swapfile
      when: swap_check.stdout == ""

    - name: Set swapfile permissions
      file:
        path: /swapfile
        mode: '0600'
      when: swap_check.stdout == ""

    - name: Format swapfile
      command: mkswap /swapfile
      when: swap_check.stdout == ""

    - name: Enable swap
      command: swapon /swapfile
      when: swap_check.stdout == ""

    - name: Make swap permanent in fstab
      lineinfile:
        path: /etc/fstab
        line: '/swapfile swap swap defaults 0 0'
        state: present
      when: swap_check.stdout == ""

    - name: Verify swap is active
      shell: free -h | grep -i swap
      register: swap_status
      changed_when: false

    - name: Display swap status
      debug:
        var: swap_status.stdout

    # ─── Step 0b: Install Docker (if not already present) ───
    - name: Check if Docker is installed
      command: docker --version
      register: docker_check
      ignore_errors: yes
      changed_when: false

    - name: Install Docker on Amazon Linux 2023
      yum:
        name: docker
        state: present
      when: docker_check.rc != 0

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ec2-user to docker group
      user:
        name: ec2-user
        groups: docker
        append: yes

    - name: Reload docker group permissions
      meta: reset_connection

    # ─── Step 1: Fetch secrets from AWS Secrets Manager ───
    - name: Fetch secrets from AWS Secrets Manager
      shell: |
        aws secretsmanager get-secret-value \
          --secret-id workforce/prod \
          --region {{ aws_region }} \
          --query 'SecretString' \
          --output text
      register: secret_json
      no_log: true

    - name: Parse secrets JSON
      set_fact:
        db_username: "{{ (secret_json.stdout | from_json).DB_USERNAME }}"
        db_password: "{{ (secret_json.stdout | from_json).DB_PASSWORD }}"
        jwt_secret: "{{ (secret_json.stdout | from_json).JWT_SECRET }}"
        mail_username: "{{ (secret_json.stdout | from_json).MAIL_USERNAME }}"
        mail_password: "{{ (secret_json.stdout | from_json).MAIL_PASSWORD }}"
      no_log: true

    - name: Verify secrets were parsed (show lengths only)
      debug:
        msg: >
          Parsed secret lengths —
          DB_USERNAME={{ db_username | length }} chars,
          DB_PASSWORD={{ db_password | length }} chars,
          JWT_SECRET={{ jwt_secret | length }} chars,
          MAIL_USERNAME={{ mail_username | length }} chars,
          MAIL_PASSWORD={{ mail_password | length }} chars

    # ─── Step 1b: Write env file for Docker (avoids shell quoting issues) ───
    - name: Write backend environment file
      copy:
        content: |
          SPRING_PROFILES_ACTIVE=prod
          JAVA_OPTS=-Xms256m -Xmx512m -Duser.timezone=Asia/Kolkata
          AWS_REGION={{ aws_region }}
          DB_USERNAME={{ db_username }}
          DB_PASSWORD={{ db_password }}
          JWT_SECRET={{ jwt_secret }}
          MAIL_USERNAME={{ mail_username }}
          MAIL_PASSWORD={{ mail_password }}
        dest: /opt/backend.env
        mode: '0600'
        owner: root
      no_log: true

    - name: Verify env file was created
      shell: |
        echo "Env file lines: $(wc -l < /opt/backend.env)"
        echo "Keys found:"
        for KEY in SPRING_PROFILES_ACTIVE DB_USERNAME DB_PASSWORD JWT_SECRET MAIL_USERNAME MAIL_PASSWORD JAVA_OPTS; do
          if grep -q "^${KEY}=" /opt/backend.env; then
            echo "  ✅ $KEY present"
          else
            echo "  ❌ $KEY MISSING"
          fi
        done
      register: env_file_check
      changed_when: false

    - name: Display env file verification
      debug:
        var: env_file_check.stdout_lines

    # ─── Step 2: Login to ECR ───
    - name: Login to AWS ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin {{ ecr_registry }}
      register: ecr_login

    # ─── Step 2b: Pull new Docker images ───
    - name: Pull new backend image
      shell: docker pull {{ backend_image }}
      register: pull_backend
      changed_when: "'Image is up to date' not in pull_backend.stdout"

    - name: Pull new frontend image
      shell: docker pull {{ frontend_image }}
      register: pull_frontend
      changed_when: "'Image is up to date' not in pull_frontend.stdout"

    # ─── Step 3: Deregister instance from ALB (Blue phase) ───
    - name: Get IMDSv2 token
      shell: >
        curl -s -X PUT "http://169.254.169.254/latest/api/token"
        -H "X-aws-ec2-metadata-token-ttl-seconds: 21600"
      register: imds_token

    - name: Get EC2 instance ID (IMDSv2)
      shell: >
        curl -s -H "X-aws-ec2-metadata-token: {{ imds_token.stdout }}"
        http://169.254.169.254/latest/meta-data/instance-id
      register: instance_id

    - name: Deregister instance from ALB target group
      shell: |
        aws elbv2 deregister-targets \
          --target-group-arn {{ target_group_arn }} \
          --targets Id={{ instance_id.stdout }} \
          --region {{ aws_region }}
      ignore_errors: yes

    - name: Wait for connections to drain (30 seconds)
      pause:
        seconds: 30

    # ─── Step 4: Clean up port conflicts and stop old containers ───
    - name: Remove any container using port 8080
      shell: |
        docker ps -q --filter "publish=8080" | xargs -r docker rm -f
      ignore_errors: yes

    - name: Stop and remove old backend container
      shell: |
        docker stop backend || true
        docker rm backend || true
      ignore_errors: yes

    - name: Stop and remove old frontend container
      shell: |
        docker stop frontend || true
        docker rm frontend || true
      ignore_errors: yes

    # ─── Step 5: Start new containers (Green phase) ───
    - name: Start new backend container
      shell: |
        docker run -d \
          --name backend \
          --restart always \
          -p 8080:8080 \
          --memory="700m" \
          --cpus="0.8" \
          --env-file /opt/backend.env \
          --add-host=host.docker.internal:host-gateway \
          {{ backend_image }}
      register: start_backend
      changed_when: start_backend.rc == 0

    - name: Start new frontend container
      shell: |
        docker run -d \
          --name frontend \
          --restart always \
          -p 80:80 \
          --add-host=host.docker.internal:host-gateway \
          {{ frontend_image }}
      register: start_frontend
      changed_when: start_frontend.rc == 0

    - name: Wait a few seconds for container to initialize
      pause:
        seconds: 5

    - name: Show initial backend startup logs
      shell: docker logs backend 2>&1 | head -30
      register: startup_logs
      changed_when: false
      ignore_errors: yes

    - name: Display initial startup logs
      debug:
        var: startup_logs.stdout_lines

    # ─── Step 6: Health check — wait for backend to start ───
    - name: Wait for backend health check (up to 5 minutes)
      uri:
        url: http://localhost:8080/actuator/health
        method: GET
        status_code: 200
      register: health_check
      until: health_check.status is defined and health_check.status == 200
      retries: 60
      delay: 5
      ignore_errors: yes

    - name: Show backend logs if health check failed
      shell: docker logs --tail 80 backend 2>&1
      register: backend_logs
      when: health_check is failed

    - name: Display backend error logs
      debug:
        var: backend_logs.stdout_lines
      when: health_check is failed

    - name: Show container status if health check failed
      shell: docker inspect backend --format {% raw %}'{{.State.Status}} - ExitCode:{{.State.ExitCode}} - Restarting:{{.RestartCount}}'{% endraw %}
      register: container_status
      when: health_check is failed
      ignore_errors: yes

    - name: Display container status
      debug:
        var: container_status.stdout
      when: health_check is failed

    - name: Fail if health check did not pass
      fail:
        msg: "Backend health check failed after 3 minutes! Check the logs above."
      when: health_check is failed

    - name: Verify frontend is serving
      uri:
        url: http://localhost/
        status_code: 200
      register: frontend_check
      retries: 5
      delay: 3

    # ─── Step 7: Re-register instance in ALB (Green is live) ───
    - name: Re-register instance in ALB target group
      shell: |
        aws elbv2 register-targets \
          --target-group-arn {{ target_group_arn }} \
          --targets Id={{ instance_id.stdout }} \
          --region {{ aws_region }}

    - name: Wait for ALB health check to pass
      pause:
        seconds: 30

    - name: Verify instance is healthy in target group
      shell: |
        aws elbv2 describe-target-health \
          --target-group-arn {{ target_group_arn }} \
          --targets Id={{ instance_id.stdout }} \
          --region {{ aws_region }} \
          --query 'TargetHealthDescriptions[0].TargetHealth.State' \
          --output text
      register: target_health
      until: target_health.stdout == 'healthy'
      retries: 12
      delay: 10
      failed_when: false

    - name: Report ALB health status
      debug:
        msg: "ALB target health: {{ target_health.stdout | default('unknown') }}"

    - name: Warn if instance not yet healthy in ALB
      debug:
        msg: "⚠️ Instance not yet 'healthy' in ALB — deployment succeeded, ALB may need more time. Check AWS console."
      when: target_health is failed

    # ─── Step 8: Clean up old images ───
    - name: Remove unused Docker images
      shell: docker image prune -af
      ignore_errors: yes

  handlers:
    - name: Rollback deployment
      debug:
        msg: "⚠️ Deployment failed! Manual rollback may be needed."
