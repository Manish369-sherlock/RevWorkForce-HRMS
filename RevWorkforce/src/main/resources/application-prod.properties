# ========================
# PRODUCTION CONFIGURATION
# ========================
# Secrets (DB credentials, JWT, email) are injected as environment variables
# at deploy time by Ansible (fetched from AWS Secrets Manager via AWS CLI).
# Spring Boot auto-maps env vars like DB_USERNAME → spring.datasource.username

spring.application.name=Workforce
server.port=8080

# ─── Database (RDS MySQL) ───
spring.datasource.url=jdbc:mysql://workforce-db.c78yikk6u8ht.eu-north-1.rds.amazonaws.com:3306/workforce?useSSL=true&requireSSL=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=Abhinesh@5275
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ─── Timezone Configuration ───
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jackson.time-zone=Asia/Kolkata

# ─── CORS ───
app.cors.allowed-origins=http://localhost:4200,http://localhost,http://workforce-alb-1981582211.eu-north-1.elb.amazonaws.com,http://13.50.170.24

# ─── JWT Configuration ───
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ─── Attendance Settings ───
attendance.office-start-time=09:00
attendance.office-end-time=18:00
attendance.late-threshold-minutes=15
attendance.early-departure-threshold-minutes=30
geo-attendance.default-radius-meters=200

# ─── Email Configuration ───
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ─── OTP Settings ───
otp.expiry-minutes=5
otp.max-attempts=5

# ─── Swagger/OpenAPI ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ─── Ollama AI Configuration (disable if not using on EC2) ───
ollama.base-url=http://localhost:11434
ollama.model=phi3
ollama.vision-model=llava
ollama.timeout=60000

# ─── Actuator Health Endpoint ───
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging (production level) ───
logging.level.root=WARN
logging.level.org.example.workforce=INFO
